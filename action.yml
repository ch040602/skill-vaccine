name: Skill Vaccine Scan
description: Cut through risky Agent Skill packages and write SARIF output.

inputs:
  path:
    description: Skill folder or repository path to scan.
    required: false
    default: .
  fail-on:
    description: Minimum severity that makes the scan command fail.
    required: false
    default: critical
  sarif-file:
    description: Path where SARIF output will be written.
    required: false
    default: skill-vaccine-review.sarif

outputs:
  sarif-file:
    description: Path to the generated SARIF file.
    value: ${{ inputs.sarif-file }}

runs:
  using: composite
  steps:
    - name: Install Skill Vaccine
      shell: bash
      run: python -m pip install .
    - name: Run Skill Vaccine SARIF scan
      shell: bash
      run: |
        skill-vaccine scan "${{ inputs.path }}" --format sarif --fail-on "${{ inputs.fail-on }}" > "${{ inputs.sarif-file }}"

